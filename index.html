<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หลักสูตรพยาบาลศาสตรมหาบัณฑิต สาขาวิชาการผดุงครรภ์ — ระบบเรียนรู้ออนไลน์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2A2520;
    --ink-soft:#5C544A;
    --paper:#FAF6EE;
    --paper-warm:#F2EBDC;
    --burgundy:#6B1F2E;
    --burgundy-deep:#4A1520;
    --ochre:#B8860B;
    --ochre-soft:#D4A52A;
    --sage:#687A66;
    --sage-soft:#A6B19F;
    --line:#D7CDB8;
    --shadow-soft: 0 1px 2px rgba(74,21,32,0.04), 0 4px 16px rgba(74,21,32,0.06);
    --shadow-warm: 0 8px 32px rgba(107,31,46,0.08);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Sarabun', sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    font-size:16px;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse at top left, rgba(184,134,11,0.04), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(107,31,46,0.04), transparent 60%);
  }

  .display-font{font-family:'Bai Jamjuree','Cormorant Garamond',serif;letter-spacing:-0.01em}
  .serif-en{font-family:'Cormorant Garamond',serif;font-style:italic}

  /* ============ HEADER ============ */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(250,246,238,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1280px;margin:0 auto;
    padding:14px 32px;
    display:flex;align-items:center;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
  .brand-mark{
    width:42px;height:42px;flex-shrink:0;
    background:var(--burgundy);
    border-radius:50%;
    display:grid;place-items:center;
    color:var(--paper);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;font-size:20px;
    box-shadow:0 0 0 4px var(--paper),0 0 0 5px var(--burgundy);
  }
  .brand-text{display:flex;flex-direction:column;line-height:1.2;min-width:0}
  .brand-title{font-family:'Bai Jamjuree',sans-serif;font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ochre);font-size:13px;letter-spacing:0.02em}

  .progress-wrap{display:flex;align-items:center;gap:14px}
  .progress-text{font-size:12px;color:var(--ink-soft);letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}
  .progress-bar{width:180px;height:5px;background:var(--paper-warm);border-radius:3px;overflow:hidden;position:relative}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--ochre),var(--burgundy));transition:width 0.6s cubic-bezier(.65,0,.35,1);width:0%}

  /* ============ LAYOUT ============ */
  .stage{max-width:1280px;margin:0 auto;padding:32px}

  /* ============ WELCOME SCREEN ============ */
  .welcome{
    min-height:calc(100vh - 80px);
    display:grid;place-items:center;
    padding:40px 32px;
  }
  .welcome-card{
    max-width:680px;width:100%;
    background:linear-gradient(180deg,#FFFCF4,#F8F1E0);
    border:1px solid var(--line);
    border-radius:4px;
    padding:64px 56px;
    text-align:center;
    position:relative;
    box-shadow:var(--shadow-warm);
  }
  .welcome-card::before,.welcome-card::after{
    content:'';position:absolute;
    width:60px;height:60px;
    border:1px solid var(--ochre);
  }
  .welcome-card::before{top:14px;left:14px;border-right:none;border-bottom:none}
  .welcome-card::after{bottom:14px;right:14px;border-left:none;border-top:none}

  .welcome-eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--ochre);
    font-size:18px;
    letter-spacing:0.08em;
    margin-bottom:20px;
  }
  .welcome-title{
    font-family:'Bai Jamjuree',sans-serif;
    font-weight:600;
    font-size:34px;
    line-height:1.25;
    color:var(--burgundy-deep);
    margin-bottom:14px;
  }
  .welcome-subtitle{
    font-family:'Cormorant Garamond',serif;
    font-size:22px;
    color:var(--sage);
    font-style:italic;
    margin-bottom:36px;
  }
  .welcome-divider{
    width:60px;height:1px;background:var(--ochre);
    margin:0 auto 36px;
  }
  .welcome-desc{
    color:var(--ink-soft);font-size:15px;
    margin-bottom:32px;line-height:1.8;
  }
  .name-input{
    width:100%;padding:14px 18px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
    font-family:'Sarabun',sans-serif;
    font-size:16px;color:var(--ink);
    margin-bottom:8px;
    transition:border-color .2s;
  }
  .name-input:focus{outline:none;border-color:var(--burgundy)}
  .name-hint{font-size:12px;color:var(--ink-soft);margin-bottom:24px;text-align:left}

  .btn-primary{
    background:var(--burgundy);color:var(--paper);
    border:none;padding:14px 36px;
    font-family:'Sarabun',sans-serif;font-weight:500;font-size:15px;
    letter-spacing:0.05em;
    cursor:pointer;border-radius:2px;
    transition:all .25s;
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn-primary:hover{background:var(--burgundy-deep);transform:translateY(-1px);box-shadow:0 6px 20px rgba(107,31,46,0.25)}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .btn-secondary{
    background:transparent;color:var(--burgundy);
    border:1px solid var(--burgundy);
    padding:13px 32px;
    font-family:'Sarabun',sans-serif;font-weight:500;font-size:15px;
    cursor:pointer;border-radius:2px;
    transition:all .25s;
  }
  .btn-secondary:hover{background:var(--burgundy);color:var(--paper)}

  .welcome-meta{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:24px;margin-top:40px;padding-top:32px;
    border-top:1px solid var(--line);
  }
  .meta-item{text-align:center}
  .meta-num{
    font-family:'Cormorant Garamond',serif;
    font-size:32px;color:var(--burgundy);
    font-weight:600;
  }
  .meta-label{
    font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:0.1em;margin-top:4px;
  }

  /* ============ LEARNING VIEW ============ */
  .learn-grid{
    display:grid;
    grid-template-columns:280px 1fr;
    gap:48px;
    align-items:start;
  }

  .sidebar{
    position:sticky;top:90px;
    background:var(--paper-warm);
    border:1px solid var(--line);
    border-radius:2px;
    padding:24px 0;
  }
  .sidebar-title{
    padding:0 24px 16px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:14px;
    color:var(--ochre);
    letter-spacing:0.1em;
    text-transform:uppercase;
    border-bottom:1px solid var(--line);
    margin-bottom:8px;
  }
  .sidebar-list{list-style:none}
  .sidebar-item{
    padding:12px 24px;
    cursor:pointer;
    display:flex;align-items:flex-start;gap:12px;
    transition:background .2s;
    border-left:2px solid transparent;
    font-size:14px;color:var(--ink-soft);
    line-height:1.4;
  }
  .sidebar-item:hover{background:rgba(184,134,11,0.06);color:var(--ink)}
  .sidebar-item.active{
    background:rgba(107,31,46,0.06);
    border-left-color:var(--burgundy);
    color:var(--burgundy);
    font-weight:500;
  }
  .sidebar-item.completed{color:var(--sage)}
  .module-num{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:14px;
    color:var(--ochre);
    flex-shrink:0;
    width:24px;
    font-weight:500;
  }
  .check-icon{
    width:14px;height:14px;flex-shrink:0;
    display:none;color:var(--sage);margin-top:2px;
  }
  .sidebar-item.completed .check-icon{display:inline-block}

  /* ============ CONTENT ============ */
  .content{
    background:#FFFCF4;
    border:1px solid var(--line);
    padding:56px 64px;
    border-radius:2px;
    box-shadow:var(--shadow-soft);
    animation:fadeUp .5s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .module-eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--ochre);
    font-size:16px;
    letter-spacing:0.1em;
    margin-bottom:8px;
  }
  .module-title{
    font-family:'Bai Jamjuree',sans-serif;
    font-weight:600;
    font-size:36px;
    line-height:1.2;
    color:var(--burgundy-deep);
    margin-bottom:8px;
  }
  .module-subtitle{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--sage);
    font-size:20px;
    margin-bottom:32px;
  }
  .module-divider{
    width:48px;height:1px;background:var(--ochre);
    margin-bottom:32px;
  }

  .content h3{
    font-family:'Bai Jamjuree',sans-serif;
    font-size:21px;
    font-weight:600;
    color:var(--burgundy);
    margin:32px 0 14px;
    padding-bottom:8px;
    border-bottom:1px dashed var(--line);
  }
  .content h4{
    font-family:'Bai Jamjuree',sans-serif;
    font-size:17px;
    font-weight:600;
    color:var(--ink);
    margin:24px 0 10px;
  }
  .content p{margin-bottom:16px;color:var(--ink)}
  .content strong{color:var(--burgundy);font-weight:600}
  .content em{font-family:'Cormorant Garamond',serif;color:var(--ochre);font-style:italic}

  .content ul,.content ol{margin:14px 0 20px 24px}
  .content li{margin-bottom:10px;line-height:1.7}
  .content ul li::marker{color:var(--ochre)}

  .info-card{
    background:var(--paper-warm);
    border-left:3px solid var(--ochre);
    padding:20px 24px;
    margin:24px 0;
    border-radius:2px;
  }
  .info-card-title{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--burgundy);
    font-size:15px;
    letter-spacing:0.05em;
    margin-bottom:8px;
  }

  .stat-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:1px;background:var(--line);
    border:1px solid var(--line);
    margin:24px 0;
  }
  .stat{
    background:#FFFCF4;padding:24px 20px;text-align:center;
  }
  .stat-num{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:36px;color:var(--burgundy);line-height:1;
  }
  .stat-label{
    font-size:12px;color:var(--ink-soft);
    margin-top:8px;letter-spacing:0.05em;text-transform:uppercase;
  }

  .course-list{margin:20px 0;list-style:none}
  .course-item{
    background:#FFFCF4;
    border:1px solid var(--line);
    padding:18px 22px;
    margin-bottom:10px;
    border-radius:2px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:16px;
    align-items:center;
    transition:all .2s;
  }
  .course-item:hover{border-color:var(--ochre);box-shadow:0 2px 8px rgba(184,134,11,0.08)}
  .course-code{
    font-family:'Cormorant Garamond',serif;
    color:var(--ochre);font-size:15px;font-style:italic;
    letter-spacing:0.03em;
  }
  .course-body{}
  .course-name{font-weight:600;color:var(--ink);font-size:15px;margin-bottom:2px}
  .course-name-en{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:14px}
  .course-credit{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--burgundy);
    font-weight:600;font-size:15px;
    white-space:nowrap;
  }
  .course-desc{
    grid-column:1/-1;
    color:var(--ink-soft);
    font-size:14px;
    margin-top:8px;
    padding-top:12px;
    border-top:1px dashed var(--line);
    line-height:1.7;
  }

  /* PLO/PEO cards */
  .plo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:24px 0}
  .plo-card{
    background:#FFFCF4;
    border:1px solid var(--line);
    padding:22px;border-radius:2px;
    position:relative;
    padding-left:60px;
  }
  .plo-num{
    position:absolute;left:18px;top:18px;
    width:32px;height:32px;
    border:1px solid var(--burgundy);
    border-radius:50%;
    display:grid;place-items:center;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;
    color:var(--burgundy);
    font-size:16px;
  }
  .plo-card h4{margin-top:0;color:var(--burgundy);font-size:14px}
  .plo-card p{font-size:14px;color:var(--ink-soft);margin:0;line-height:1.65}

  .nav-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:48px;padding-top:32px;
    border-top:1px solid var(--line);
  }
  .nav-row .left,.nav-row .right{display:flex;gap:12px}

  /* ============ QUIZ ============ */
  .quiz-intro{
    text-align:center;padding:32px 0;
  }
  .quiz-icon{
    width:72px;height:72px;
    margin:0 auto 20px;
    background:var(--burgundy);
    border-radius:50%;
    display:grid;place-items:center;
    color:var(--paper);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;font-size:32px;
    box-shadow:0 0 0 6px var(--paper-warm),0 0 0 7px var(--ochre);
  }
  .quiz-rules{
    background:var(--paper-warm);
    border:1px dashed var(--line);
    padding:24px 28px;
    margin:32px 0;
    text-align:left;
  }
  .quiz-rules ul{margin:8px 0 0 20px}

  .quiz-question{
    margin-bottom:32px;
    padding-bottom:32px;
    border-bottom:1px dashed var(--line);
  }
  .quiz-question:last-child{border-bottom:none}
  .q-num{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--ochre);
    font-size:16px;
    letter-spacing:0.05em;
    margin-bottom:6px;
  }
  .q-text{
    font-size:17px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:18px;
    line-height:1.6;
  }
  .q-options{list-style:none;display:grid;gap:10px}
  .q-option{
    background:#FFFCF4;
    border:1px solid var(--line);
    padding:14px 20px;
    border-radius:2px;
    cursor:pointer;
    transition:all .2s;
    display:flex;align-items:center;gap:14px;
  }
  .q-option:hover{border-color:var(--ochre);background:var(--paper-warm)}
  .q-option input{display:none}
  .q-option-letter{
    width:28px;height:28px;flex-shrink:0;
    border:1px solid var(--line);
    border-radius:50%;
    display:grid;place-items:center;
    font-family:'Cormorant Garamond',serif;
    color:var(--ink-soft);
    font-style:italic;font-weight:600;font-size:14px;
    transition:all .2s;
  }
  .q-option.selected{
    background:var(--paper-warm);
    border-color:var(--burgundy);
  }
  .q-option.selected .q-option-letter{
    background:var(--burgundy);color:var(--paper);border-color:var(--burgundy);
  }
  .q-option.correct{border-color:var(--sage);background:rgba(104,122,102,0.08)}
  .q-option.correct .q-option-letter{background:var(--sage);color:var(--paper);border-color:var(--sage)}
  .q-option.incorrect{border-color:#B23A3A;background:rgba(178,58,58,0.06)}
  .q-option.incorrect .q-option-letter{background:#B23A3A;color:var(--paper);border-color:#B23A3A}

  /* ============ RESULT ============ */
  .result-card{text-align:center;padding:40px 0}
  .result-score{
    font-family:'Cormorant Garamond',serif;
    font-size:72px;
    font-weight:600;
    color:var(--burgundy);
    line-height:1;
    margin:16px 0 8px;
  }
  .result-score .total{color:var(--ink-soft);font-size:36px}
  .result-msg{
    font-family:'Bai Jamjuree',sans-serif;
    font-size:24px;font-weight:600;
    margin:20px 0 12px;
  }
  .result-msg.pass{color:var(--sage)}
  .result-msg.fail{color:var(--burgundy)}
  .result-desc{color:var(--ink-soft);margin-bottom:24px;font-size:15px}

  /* ============ CERTIFICATE ============ */
  .cert-stage{
    background:linear-gradient(160deg,#3A0F18 0%,#1A0809 100%);
    min-height:calc(100vh - 80px);
    padding:48px 24px;
    display:flex;flex-direction:column;align-items:center;
    gap:24px;
  }
  .cert-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .cert-actions .btn-primary{background:var(--ochre);color:var(--burgundy-deep)}
  .cert-actions .btn-primary:hover{background:var(--ochre-soft)}
  .cert-actions .btn-secondary{color:var(--ochre);border-color:var(--ochre)}
  .cert-actions .btn-secondary:hover{background:var(--ochre);color:var(--burgundy-deep)}

  .certificate{
    width:100%;max-width:920px;
    aspect-ratio:1.414/1;
    background:linear-gradient(180deg,#FFFDF5,#F8F1DF);
    position:relative;
    padding:64px 72px;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    display:flex;flex-direction:column;
  }
  .certificate::before{
    content:'';position:absolute;
    inset:18px;border:1px solid var(--ochre);
    pointer-events:none;
  }
  .certificate::after{
    content:'';position:absolute;
    inset:24px;border:1px dashed var(--ochre-soft);
    pointer-events:none;
  }
  .cert-corner{
    position:absolute;width:48px;height:48px;
    border:2px solid var(--burgundy);
  }
  .cert-corner.tl{top:36px;left:36px;border-right:none;border-bottom:none}
  .cert-corner.tr{top:36px;right:36px;border-left:none;border-bottom:none}
  .cert-corner.bl{bottom:36px;left:36px;border-right:none;border-top:none}
  .cert-corner.br{bottom:36px;right:36px;border-left:none;border-top:none}

  .cert-header{text-align:center;padding-top:8px}
  .cert-seal{
    width:64px;height:64px;
    background:var(--burgundy);
    border-radius:50%;
    margin:0 auto 14px;
    display:grid;place-items:center;
    color:var(--ochre);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;font-size:28px;
    box-shadow:0 0 0 4px #FFFDF5,0 0 0 5px var(--ochre);
  }
  .cert-eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--ochre);
    font-size:16px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .cert-title{
    font-family:'Cormorant Garamond',serif;
    font-size:42px;
    font-weight:600;
    color:var(--burgundy-deep);
    line-height:1.1;
    margin-bottom:6px;
  }
  .cert-subtitle{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--sage);
    font-size:18px;
  }
  .cert-divider{
    width:80px;height:1px;background:var(--ochre);
    margin:14px auto;
  }

  .cert-body{
    flex:1;text-align:center;
    display:flex;flex-direction:column;justify-content:center;
    padding:8px 24px;
  }
  .cert-presented{
    font-size:13px;color:var(--ink-soft);
    letter-spacing:0.2em;text-transform:uppercase;
    margin-bottom:14px;
  }
  .cert-name{
    font-family:'Bai Jamjuree',sans-serif;
    font-weight:600;
    font-size:36px;
    color:var(--burgundy-deep);
    margin-bottom:6px;
    border-bottom:1px solid var(--ochre);
    padding-bottom:14px;
    display:inline-block;
    min-width:60%;
  }
  .cert-text{
    font-size:14px;color:var(--ink-soft);
    margin:14px 0 18px;
    max-width:520px;
    margin-left:auto;margin-right:auto;
    line-height:1.7;
  }
  .cert-course{
    font-family:'Bai Jamjuree',sans-serif;
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .cert-course-en{

  },
  {
    q: 'จุดเน้นของหลักสูตรในมิติของการเชื่อมโยงระบบบริการสุขภาพคืออะไร',
    options: [
      'Tertiary Care Midwifery',
      'Primary Care Midwifery',
      'Hospital-based Midwifery เพียงอย่างเดียว',
      'Home-based Midwifery เพียงอย่างเดียว'
    ],
    correct: 1
  },
  {
    q: 'รายวิชา "การพยาบาลทางไกลและการสื่อสารสุขภาพ" (Telenursing and Health Communication) อยู่ในหมวดใด',
    options: ['หมวดวิชาแกน', 'หมวดวิชาเฉพาะ', 'หมวดวิชาเลือก', 'วิทยานิพนธ์'],
    correct: 2
  }
];

/* =========================================================
   RENDER
========================================================= */
const root = document.getElementById('root');

function updateProgress(){
  const wrap = document.getElementById('progressWrap');
  if (state.view === 'welcome' || state.view === 'certificate'){
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';
  const completedCount = state.completed.size;
  const total = modules.length;
  document.getElementById('progNum').textContent = completedCount;
  document.getElementById('progFill').style.width = (completedCount / total * 100) + '%';
}

function renderWelcome(){
  root.innerHTML = `
    <div class="welcome">
      <div class="welcome-card">
        <div class="welcome-eyebrow">คณะพยาบาลศาสตร์ · สถาบันพระบรมราชชนก</div>
        <h1 class="welcome-title">หลักสูตรพยาบาลศาสตรมหาบัณฑิต<br>สาขาวิชาการผดุงครรภ์</h1>
        <p class="welcome-subtitle">Master of Nursing Science · Midwifery</p>
        <div class="welcome-divider"></div>
        <p class="welcome-desc">
          ระบบเรียนรู้ออนไลน์เพื่อแนะนำหลักสูตร ให้ผู้สนใจและนักศึกษาใหม่ได้รู้จักวัตถุประสงค์ ผลลัพธ์การเรียนรู้ โครงสร้างรายวิชา แผนการศึกษา และเกณฑ์การสำเร็จการศึกษา ผ่าน <em>12 บทเรียนสั้นๆ</em>
        </p>

        <input type="text" id="nameInput" class="name-input" placeholder="กรอกชื่อ-นามสกุลของคุณ (สำหรับประกาศนียบัตร)" maxlength="80" />
        <div class="name-hint">ตัวอย่าง: นางสาวสุภาวดี รักการศึกษา</div>

        <button class="btn-primary" id="startBtn" disabled>
          เริ่มเรียนรู้
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>

        <div class="welcome-meta">
          <div class="meta-item"><div class="meta-num">12</div><div class="meta-label">บทเรียน</div></div>
          <div class="meta-item"><div class="meta-num">10</div><div class="meta-label">ข้อสอบรวบยอด</div></div>
          <div class="meta-item"><div class="meta-num">80%</div><div class="meta-label">เกณฑ์ผ่าน</div></div>
        </div>
      </div>
    </div>
  `;

  const input = document.getElementById('nameInput');
  const btn = document.getElementById('startBtn');
  input.value = state.studentName;
  btn.disabled = !state.studentName.trim();
  input.addEventListener('input', e=>{
    state.studentName = e.target.value;
    btn.disabled = !state.studentName.trim();
  });
  btn.addEventListener('click', ()=>{
    if (!state.studentName.trim()) return;
    state.view = 'learn';
    state.currentModule = 0;
    render();
  });
}

function renderLearn(){
  const m = modules[state.currentModule];
  const total = modules.length;
  const allDone = state.completed.size === total;

  const sidebar = modules.map((mod, i)=>{
    const done = state.completed.has(i);
    const active = i === state.currentModule;
    return `
      <li class="sidebar-item ${active?'active':''} ${done?'completed':''}" data-idx="${i}">
        <span class="module-num">${String(i+1).padStart(2,'0')}</span>
        <span style="flex:1">${mod.title}</span>
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      </li>
    `;
  }).join('');

  const isLast = state.currentModule === total - 1;

  root.innerHTML = `
    <div class="stage">
      <div class="learn-grid">
        <aside class="sidebar">
          <div class="sidebar-title">บทเรียนทั้งหมด</div>
          <ul class="sidebar-list">${sidebar}</ul>
        </aside>

        <article class="content">
          <div class="module-eyebrow">บทที่ ${String(state.currentModule+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>
          <h1 class="module-title">${m.title}</h1>
          <p class="module-subtitle">${m.subtitle}</p>
          <div class="module-divider"></div>
          ${m.body}

          <div class="nav-row">
            <div class="left">
              ${state.currentModule > 0 ? '<button class="btn-secondary" id="prevBtn">← บทก่อนหน้า</button>' : ''}
            </div>
            <div class="right">
              ${ isLast
                ? (allDone
                  ? '<button class="btn-primary" id="quizBtn">ทำแบบทดสอบรวบยอด <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>'
                  : '<button class="btn-primary" id="completeBtn">เรียนจบบทนี้ → เปิดแบบทดสอบ</button>')
                : '<button class="btn-primary" id="nextBtn">บทถัดไป <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>'
              }
            </div>
          </div>
        </article>
      </div>
    </div>
  `;

  // sidebar click
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      // mark current as completed when leaving
      state.completed.add(state.currentModule);
      state.currentModule = parseInt(el.dataset.idx);
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });

  // nav buttons
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) prevBtn.addEventListener('click', ()=>{
    state.completed.add(state.currentModule);
    state.currentModule--;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.addEventListener('click', ()=>{
    state.completed.add(state.currentModule);
    state.currentModule++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
  const completeBtn = document.getElementById('completeBtn');
  if (completeBtn) completeBtn.addEventListener('click', ()=>{
    state.completed.add(state.currentModule);
    render();
  });
  const quizBtn = document.getElementById('quizBtn');
  if (quizBtn) quizBtn.addEventListener('click', ()=>{
    state.view = 'quiz';
    state.quizAnswers = {};
    state.quizSubmitted = false;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function renderQuiz(){
  if (!state.quizSubmitted){
    const questions = quiz.map((q,i)=>{
      const selected = state.quizAnswers[i];
      const opts = q.options.map((opt,j)=>{
        const letter = String.fromCharCode(65+j);
        const isSel = selected === j;
        return `
          <li class="q-option ${isSel?'selected':''}" data-q="${i}" data-opt="${j}">
            <span class="q-option-letter">${letter}</span>
            <span>${opt}</span>
          </li>
        `;
      }).join('');
      return `
        <div class="quiz-question">
          <div class="q-num">Question ${String(i+1).padStart(2,'0')}</div>
          <div class="q-text">${q.q}</div>
          <ul class="q-options">${opts}</ul>
        </div>
      `;
    }).join('');

    const allAnswered = Object.keys(state.quizAnswers).length === quiz.length;

    root.innerHTML = `
      <div class="stage">
        <article class="content" style="max-width:820px;margin:0 auto">
          <div class="quiz-intro">
            <div class="quiz-icon">Q</div>
            <div class="module-eyebrow">Final Assessment</div>
            <h1 class="module-title">แบบทดสอบรวบยอด</h1>
            <p class="module-subtitle">Comprehensive Quiz · ${quiz.length} ข้อ</p>
          </div>

          <div class="quiz-rules">
            <div class="info-card-title">กติกา</div>
            <ul style="margin:8px 0 0 20px">
              <li>มีทั้งหมด <strong>${quiz.length} ข้อ</strong> ตอบถูก <strong>≥ 80%</strong> เพื่อรับประกาศนียบัตร</li>
              <li>เลือกคำตอบที่ถูกต้องที่สุด สามารถเปลี่ยนคำตอบได้ก่อนกดส่ง</li>
              <li>ตอบครบทุกข้อก่อนกด "ส่งคำตอบ"</li>
            </ul>
          </div>

          ${questions}

          <div class="nav-row">
            <div class="left">
              <button class="btn-secondary" id="backToLearn">← กลับไปทบทวน</button>
            </div>
            <div class="right">
              <button class="btn-primary" id="submitQuiz" ${allAnswered?'':'disabled'}>
                ส่งคำตอบ
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </div>
          </div>
        </article>
      </div>
    `;

    document.querySelectorAll('.q-option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const qi = parseInt(el.dataset.q);
        const oi = parseInt(el.dataset.opt);
        state.quizAnswers[qi] = oi;
        renderQuiz();
      });
    });
    document.getElementById('backToLearn').addEventListener('click', ()=>{
      state.view = 'learn';
      render();
    });
    const sub = document.getElementById('submitQuiz');
    sub.addEventListener('click', ()=>{
      // calculate score
      let score = 0;
      quiz.forEach((q,i)=>{ if (state.quizAnswers[i] === q.correct) score++; });
      state.score = score;
      state.quizSubmitted = true;
      state.certId = state.certId || ('MNS-MID-' + Date.now().toString().slice(-8));

      // บันทึกผลลงฐานข้อมูล Google Sheets (background, ไม่บล็อก UI)
      recordToGoogleSheets();

      state.view = 'result';
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });

  }
}

function renderResult(){
  const total = quiz.length;
  const pct = Math.round(state.score / total * 100);
  const passed = pct >= 80;

  const reviewItems = quiz.map((q,i)=>{
    const userAns = state.quizAnswers[i];
    const correct = q.correct;
    const opts = q.options.map((opt,j)=>{
      let cls = '';
      let letter = String.fromCharCode(65+j);
      if (j === correct) cls = 'correct';
      else if (j === userAns) cls = 'incorrect';
      return `
        <li class="q-option ${cls}">
          <span class="q-option-letter">${letter}</span>
          <span>${opt}</span>
          ${j === correct ? '<span style="margin-left:auto;color:var(--sage);font-size:13px">✓ คำตอบที่ถูก</span>' : (j === userAns ? '<span style="margin-left:auto;color:#B23A3A;font-size:13px">คำตอบของคุณ</span>' : '')}
        </li>
      `;
    }).join('');
    return `
      <div class="quiz-question">
        <div class="q-num">Question ${String(i+1).padStart(2,'0')} ${userAns === correct ? '· <span style="color:var(--sage)">ถูกต้อง</span>' : '· <span style="color:#B23A3A">ผิด</span>'}</div>
        <div class="q-text">${q.q}</div>
        <ul class="q-options">${opts}</ul>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="stage">
      <article class="content" style="max-width:820px;margin:0 auto">
        <div class="result-card">
          <div class="module-eyebrow">${passed ? 'Congratulations' : 'Almost There'}</div>
          <div class="result-score">${state.score}<span class="total"> / ${total}</span></div>
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ochre);font-size:18px">${pct}% accuracy</div>
          <h2 class="result-msg ${passed?'pass':'fail'}">${passed ? 'ยินดีด้วย คุณผ่านเกณฑ์แล้ว' : 'ยังไม่ผ่านเกณฑ์ 80%'}</h2>
          <p class="result-desc">${passed
            ? 'คุณได้ทำความเข้าใจหลักสูตรพยาบาลศาสตรมหาบัณฑิต สาขาวิชาการผดุงครรภ์ ครบถ้วนแล้ว — กดปุ่มด้านล่างเพื่อรับประกาศนียบัตร'
            : 'ลองทบทวนเนื้อหาในบทเรียนอีกครั้ง แล้วทำแบบทดสอบใหม่ได้เลย'}</p>

          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            ${passed
              ? '<button class="btn-primary" id="getCert">รับประกาศนียบัตร <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15l-2 5 4-3 4 3-2-5"/><circle cx="12" cy="9" r="6"/></svg></button>'
              : '<button class="btn-primary" id="retake">ทำแบบทดสอบใหม่</button>'}
            <button class="btn-secondary" id="backLearn">กลับไปทบทวนบทเรียน</button>
          </div>
        </div>

        <h3 style="margin-top:48px">เฉลยและคำตอบของคุณ</h3>
        ${reviewItems}
      </article>
    </div>
  `;

  if (passed){
    document.getElementById('getCert').addEventListener('click', ()=>{
      state.view = 'certificate';
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  } else {
    document.getElementById('retake').addEventListener('click', ()=>{
      state.quizAnswers = {};
      state.quizSubmitted = false;
      state.view = 'quiz';
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
  document.getElementById('backLearn').addEventListener('click', ()=>{
    state.view = 'learn';
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function renderCertificate(){
  const date = new Date();
  const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const thaiYear = date.getFullYear() + 543;
  const dateStr = `${date.getDate()} ${thMonths[date.getMonth()]} พ.ศ. ${thaiYear}`;
  const certId = state.certId || ('MNS-MID-' + Date.now().toString().slice(-8));
  const pct = Math.round(state.score / quiz.length * 100);

  root.innerHTML = `
    <div class="cert-stage">
      <div class="cert-actions">
        <button class="btn-primary" onclick="window.print()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
          พิมพ์/บันทึกเป็น PDF
        </button>
        <button class="btn-secondary" id="restartBtn">เริ่มใหม่</button>
      </div>

      <div class="certificate" id="certificate">
        <div class="cert-corner tl"></div>
        <div class="cert-corner tr"></div>
        <div class="cert-corner bl"></div>
        <div class="cert-corner br"></div>

        <div class="cert-header">
          <div class="cert-seal">M</div>
          <div class="cert-eyebrow">Certificate of Completion</div>
          <h1 class="cert-title">ประกาศนียบัตร</h1>
          <p class="cert-subtitle">คณะพยาบาลศาสตร์ · สถาบันพระบรมราชชนก</p>
          <div class="cert-divider"></div>
        </div>

        <div class="cert-body">
          <div class="cert-presented">มอบให้แก่ · presented to</div>
          <div class="cert-name">${escapeHtml(state.studentName)}</div>
          <p class="cert-text">เพื่อรับรองว่าได้ศึกษาและผ่านการประเมินความรู้ความเข้าใจเกี่ยวกับ</p>
          <div class="cert-course">หลักสูตรพยาบาลศาสตรมหาบัณฑิต สาขาวิชาการผดุงครรภ์</div>
          <div class="cert-course-en">Master of Nursing Science Programme in Midwifery</div>
          <p class="cert-text">โดยตอบคำถามถูกต้อง <strong style="color:var(--burgundy-deep)">${state.score} จาก ${quiz.length} ข้อ (${pct}%)</strong> ผ่านเกณฑ์ที่กำหนด</p>
        </div>

        <div class="cert-footer">
          <div class="cert-sig">
            <div class="cert-sig-line"></div>
            <div class="cert-sig-name">${dateStr}</div>
            <div>วันที่ออกประกาศนียบัตร · Date Issued</div>
          </div>
          <div class="cert-stamp">
            <div>
              <strong>VERIFIED</strong>
              ${certId}
            </div>
          </div>
          <div class="cert-sig">
            <div class="cert-sig-line"></div>
            <div class="cert-sig-name">คณะกรรมการบริหารหลักสูตร</div>
            <div>Programme Committee</div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('restartBtn').addEventListener('click', ()=>{
    if (!confirm('ต้องการเริ่มใหม่ทั้งหมดใช่หรือไม่?')) return;
    state.studentName = '';
    state.view = 'welcome';
    state.currentModule = 0;
    state.completed = new Set();
    state.quizAnswers = {};
    state.quizSubmitted = false;
    state.score = 0;
    state.certId = '';
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function render(){
  switch(state.view){
    case 'welcome': renderWelcome(); break;
    case 'learn': renderLearn(); break;
    case 'quiz': renderQuiz(); break;
    case 'result': renderResult(); break;
    case 'certificate': renderCertificate(); break;
  }
  updateProgress();
}

render();
</script>

</body>
</html>
